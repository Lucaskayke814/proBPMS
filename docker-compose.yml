services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: probpms
      POSTGRES_USER: probpms
      POSTGRES_PASSWORD: probpms_dev
    ports: ["5432:5432"]
    volumes: [postgres_data:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U probpms -d probpms"]
      interval: 5s
      timeout: 3s
      retries: 10
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: probpms
      MINIO_ROOT_PASSWORD: probpms_dev_password
    ports: ["9000:9000", "9001:9001"]
    volumes: [minio_data:/data]
volumes:
  postgres_data:
  minio_data:
