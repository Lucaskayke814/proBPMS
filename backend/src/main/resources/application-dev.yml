# DEVELOPMENT PROFILE - Supabase Only
# Use: mvn spring-boot:run -Dspring.profiles.active=dev

spring:
  application.name: probpms-api
  
  datasource:
    url: ${SUPABASE_DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
  
  jpa:
    open-in-view: false
    hibernate.ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
  
  flyway:
    enabled: true
  
  data:
    web:
      pageable:
        max-page-size: 100

server:
  error:
    include-message: never

security:
  jwt:
    issuer: ${SUPABASE_ISSUER:https://cyolmcowhfhymemmxgrn.supabase.co/auth/v1}
    ttl-seconds: 3600
    jwks-url: ${SUPABASE_JWKS_URL:https://cyolmcowhfhymemmxgrn.supabase.co/auth/v1/.well-known/jwks.json}
    supabase-url: ${SUPABASE_URL:https://cyolmcowhfhymemmxgrn.supabase.co}
    supabase-publishable-key: ${SUPABASE_PUBLISHABLE_KEY:}
    supabase-secret-key: ${SUPABASE_SECRET_KEY:}
